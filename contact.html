	<head>
		<meta charset="UTF-8" />

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		/>
		<!--Main CSS-->
		<link rel="stylesheet" href="css/style.css" />
		<!--Main JS-->
		<script defer src="js/main.js"></script>
	</head>
	<body>
		<!--Navbar Start-->
		<nav class="navbar">
			<div class="container">
				<div class="row justify-content-between">
					<div class="logo">
						<a href="index.html">Build<span>Master</span></a>
					</div>
					<div class="links">
						<ul class="menu">
							<li class="nav-item">
								<a href="index.html" class="nav-link active"
									>Home<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="about.html" class="nav-link">About<span></span></a>
							</li>
							<li class="nav-item">
								<a href="services.html" class="nav-link"
									>Services<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="portfolio.html" class="nav-link"
									>Portfolio<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="pricing.html" class="nav-link">Pricing<span></span></a>
							</li>
							<li class="nav-item">
								<a href="contact.html" class="nav-link">Contact<span></span></a>
							</li>
						</ul>
					</div>
					<div class="menu-btn">
						<i class="fas fa-bars"></i>
					</div>
				</div>
			</div>
		</nav>
		<!--Navbar End-->
		<main>
			<!--Contact Section Start-->
			<section class="contact-section section-padding" id="contact">
				<div class="container">
					<div class="row">
						<div class="section-title text-align">
							<h5 class="sub-title">Contact</h5>
							<h3 class="main-title">Get in touch</h3>
							<ul class="line">
								<li></li>
								<li></li>
								<li></li>
							</ul>
						</div>
					</div>
					<div class="row">
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-phone"></i>
								<span>Phone</span>
								<p>+44 7700 900123</p>
							</div>
						</div>
						<!--Contact item end-->
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-envelope"></i>
								<span>Email</span>
								<p>info@buildmaster.co.uk</p>
							</div>
						</div>
						<!--Contact item end-->
						<!--Contact item start-->
						<div class="contact-item">
							<div class="contact-item-inner">
								<i class="fas fa-map-marker-alt"></i>
								<span>Address</span>
								<p>Bangor, Wales, United Kingdom</p>
							</div>
						</div>
						<!--Contact item end-->
					</div>
					<!--Contact Form-->
					<div class="row">
						<div class="contact-form">
							<form action="">
								<div class="row">
									<div class="w-50">
										<div class="input-group">
											<input
												type="text"
												placeholder="Name"
												class="input-control"
											/>
										</div>
										<div class="input-group">
											<input
												type="email"
												placeholder="Email"
												class="input-control"
											/>
										</div>
										<div class="input-group">
											<input
												type="text"
												placeholder="Subject"
												class="input-control"
											/>
										</div>
									</div>
									<div class="w-50">
										<div class="input-group">
											<textarea
												name=""
												class="input-control"
												placeholder="Message"
												id=""
												cols="30"
												rows="10"
											></textarea>
										</div>
									</div>
								</div>
								<div class="row">
									<div class="submit-btn">
										<button type="submit" class="btn-1">Send Message</button>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</section>
			<!--Contact Section End-->
		</main>
		<!--Footer Section Start-->
		<footer class="footer">
			<div class="container">
				<div class="row justify-content-center">
					<p class="copyright-text">&copy; 2026 BuildMaster Construction</p>
				</div>
			</div>
		</footer>
		<!--Footer Section End-->
	</body>
</html>
