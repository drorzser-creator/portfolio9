<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Portfolio | BuildMaster Construction</title>
		<!--Font awesome -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		/>
		<!--Main CSS-->
		<link rel="stylesheet" href="css/style.css" />
		<!--Main JS-->
		<script defer src="js/main.js"></script>
	</head>
	<body>
		<!--Navbar Start-->
		<nav class="navbar">
			<div class="container">
				<div class="row justify-content-between">
					<div class="logo">
						<a href="index.html">Build<span>Master</span></a>
					</div>
					<div class="links">
						<ul class="menu">
							<li class="nav-item">
								<a href="index.html" class="nav-link active"
									>Home<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="about.html" class="nav-link">About<span></span></a>
							</li>
							<li class="nav-item">
								<a href="services.html" class="nav-link"
									>Services<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="portfolio.html" class="nav-link"
									>Portfolio<span></span
								></a>
							</li>
							<li class="nav-item">
								<a href="pricing.html" class="nav-link">Pricing<span></span></a>
							</li>
							<li class="nav-item">
								<a href="contact.html" class="nav-link">Contact<span></span></a>
							</li>
						</ul>
					</div>
					<div class="menu-btn">
						<i class="fas fa-bars"></i>
					</div>
				</div>
			</div>
		</nav>
		<!--Navbar End-->
		<main>
			<!--Portfolio Section Start-->
			<section class="portfolio section-padding" id="portfolio">
				<div class="container">
					<div class="row">
						<div class="section-title text-align">
							<h5 class="sub-title">Portfolio</h5>
							<h3 class="main-title">Our latest work</h3>
							<ul class="line">
								<li></li>
								<li></li>
								<li></li>
							</ul>
						</div>
					</div>
					<!--Section Title-->
					<div class="row">
						<div class="portfolio-filter">
							<button type="button" class="active" data-filter="all">
								All
							</button>
							<button type="button" data-filter="residential">
								Residential
							</button>
							<button type="button" data-filter="renovation">Renovation</button>
							<button type="button" data-filter="commercial">Commercial</button>
						</div>
					</div>
					<div class="row">
						<!--Portfolio-items start-->
						<div class="row portfolio-items-container"></div>
						<!--Portfolio-items end-->
					</div>
				</div>
			</section>
			<!--Portfolio Section End-->

			<!--Carousel Section Start-->
			<section class="carousel section-padding" id="carousel">
				<div class="section-title text-align">
					<h5 class="sub-title">Carousel</h5>
					<h3 class="main-title">Featured Projects</h3>
				</div>

				<div class="carousel-container">
					<div class="carousel-item">
						<img
							class="carousel-img"
							src="images/portfolio/portfolio-2.jpg"
							alt=""
						/>
						<h4 class="carousel-title"></h4>
						<p class="carousel-desc"></p>

						<div class="carousel-controls">
							<button class="prev-btn">
								<i class="fa fa-angle-left"></i>
							</button>

							<button class="next-btn">
								<i class="fa fa-angle-right"></i>
							</button>
						</div>
					</div>
					<div class="carousel-dots"></div>
				</div>
			</section>
			<!--Carousel Section End-->
		</main>
		<!--Footer Section Start-->
		<footer class="footer">
			<div class="container">
				<div class="row justify-content-center">
					<p class="copyright-text">&copy; 2026 BuildMaster Construction</p>
				</div>
			</div>
		</footer>
		<!--Footer Section End-->
		<!--Lightbox Start-->
		<div class="lightbox">
			<div class="lightbox-content">
				<div class="lightbox-close">&times;</div>
				<img
					src="images/portfolio/portfolio-2.jpg"
					class="lightbox-img"
					alt=""
				/>
				<div class="lightbox-caption">
					<div class="caption-text"></div>
					<div class="caption-counter"></div>
				</div>
			</div>
			<div class="lightbox-controls">
				<div class="prev-item">
					<i class="fa fa-angle-left"></i>
				</div>
				<div class="next-item">
					<i class="fa fa-angle-right"></i>
				</div>
			</div>
		</div>
		<!--Lightbox End-->
	</body>
</html>
